<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>井字棋 AI 对战</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f7f7f7;
    }
    h1 { margin-top: 20px; }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 6px;
      justify-content: center;
      margin: 20px auto;
    }

    .cell {
      width: 100px;
      height: 100px;
      font-size: 42px;
      background: white;
      border: 1px solid #ccc;
      cursor: pointer;
    }

    .cell:hover {
      background: #eee;
    }

    #status {
      font-size: 20px;
      margin: 10px 0;
    }

    button {
      padding: 8px 20px;
      font-size: 16px;
      background: #add8e6;
      border: 1px solid #87ceeb;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #87ceeb;
    }
  </style>
</head>
<body>

<h1>井字棋 · <span id="title">AI先手</span></h1>
<button id="switchBtn" onclick="switchFirstPlayer()">切换先手</button>
<button id="difficultyBtn" onclick="switchDifficulty()">难度：高</button>

<div id="status">轮到你了（X）</div>

<div class="board" id="board"></div>

<button onclick="resetGame()">重新开始</button>

<script>
let board = Array.from({ length: 3 }, () => Array(3).fill(''))
let human = 'X'
let ai = 'O'
let gameOver = false
let firstPlayer = 'ai'
let difficulty = 'high'

const statusEl = document.getElementById('status')
const switchBtn = document.getElementById('switchBtn')
const difficultyBtn = document.getElementById('difficultyBtn')
const titleSpan = document.getElementById('title')

function switchDifficulty() {
  difficulty = difficulty === 'high' ? 'low' : 'high'
  difficultyBtn.textContent = '难度：' + (difficulty === 'high' ? '高' : '低')
  resetGame()
}

function switchFirstPlayer() {
  firstPlayer = firstPlayer === 'ai' ? 'user' : 'ai'
  resetGame()
}

function resetGame() {
  board = Array.from({ length: 3 }, () => Array(3).fill(''))
  gameOver = false
  if (firstPlayer === 'ai') {
    statusEl.textContent = '轮到你了（X）'
    titleSpan.textContent = '井字棋 · AI先手'
    render()
    setTimeout(aiMove, 300)
  } else {
    statusEl.textContent = '轮到你了（X）'
    titleSpan.textContent = '井字棋 · 你先手'
    render()
  }
}

function render() {
  const boardEl = document.getElementById('board')
  boardEl.innerHTML = ''
  for (let i = 0; i < 3; i++) {
    for (let j = 0; j < 3; j++) {
      const cell = document.createElement('div')
      cell.className = 'cell'
      cell.textContent = board[i][j]
      cell.onclick = () => playerMove(i, j)
      boardEl.appendChild(cell)
    }
  }
}

function playerMove(i, j) {
  if (gameOver || board[i][j]) return
  board[i][j] = human
  render()

  if (checkWinner(board) === human) {
    statusEl.textContent = '🎉 你赢了！'
    gameOver = true
    return
  }

  if (isFull(board)) {
    statusEl.textContent = '平局 🤝'
    gameOver = true
    return
  }

  statusEl.textContent = 'AI 思考中...'
  setTimeout(aiMove, 300)
}

function aiMove() {
  const bestMove = getBestMove(board)
  board[bestMove.i][bestMove.j] = ai
  render()

  if (checkWinner(board) === ai) {
    statusEl.textContent = '😈 AI 赢了'
    gameOver = true
    return
  }

  if (isFull(board)) {
    statusEl.textContent = '平局 🤝'
    gameOver = true
    return
  }

  statusEl.textContent = '轮到你了（X）'
}

// ---------- Minimax AI ----------
function getBestMove(board) {
  if (difficulty === 'low') {
    const emptyCells = []
    for (let i = 0; i < 3; i++) {
      for (let j = 0; j < 3; j++) {
        if (!board[i][j]) {
          emptyCells.push({ i, j })
        }
      }
    }
    return emptyCells[Math.floor(Math.random() * emptyCells.length)]
  }

  let bestScore = -Infinity
  let move = {}

  for (let i = 0; i < 3; i++) {
    for (let j = 0; j < 3; j++) {
      if (!board[i][j]) {
        board[i][j] = ai
        let score = minimax(board, 0, false)
        board[i][j] = ''
        if (score > bestScore) {
          bestScore = score
          move = { i, j }
        }
      }
    }
  }
  return move
}

function minimax(board, depth, isMaximizing) {
  const result = checkWinner(board)
  if (result === ai) return 10 - depth
  if (result === human) return depth - 10
  if (isFull(board)) return 0

  if (isMaximizing) {
    let best = -Infinity
    for (let i = 0; i < 3; i++) {
      for (let j = 0; j < 3; j++) {
        if (!board[i][j]) {
          board[i][j] = ai
          best = Math.max(best, minimax(board, depth + 1, false))
          board[i][j] = ''
        }
      }
    }
    return best
  } else {
    let best = Infinity
    for (let i = 0; i < 3; i++) {
      for (let j = 0; j < 3; j++) {
        if (!board[i][j]) {
          board[i][j] = human
          best = Math.min(best, minimax(board, depth + 1, true))
          board[i][j] = ''
        }
      }
    }
    return best
  }
}

// ---------- 工具函数 ----------
function checkWinner(b) {
  const lines = [
    ...b,
    [b[0][0], b[1][0], b[2][0]],
    [b[0][1], b[1][1], b[2][1]],
    [b[0][2], b[1][2], b[2][2]],
    [b[0][0], b[1][1], b[2][2]],
    [b[0][2], b[1][1], b[2][0]]
  ]
  for (let line of lines) {
    if (line[0] && line[0] === line[1] && line[1] === line[2]) {
      return line[0]
    }
  }
  return null
}

function isFull(b) {
  return b.flat().every(cell => cell)
}

resetGame()
</script>

</body>
</html>
